[time]
ticks_per_day    = 48   # Each tick ~ 30 minutes
day_start_tick   = 0    # Tick 0 = dawn
night_start_tick = 32   # Tick 32 = nightfall (~4 PM)

[needs.decay_per_tick]
hunger  = 1.0
energy  = 0.8
fun     = 0.5
social  = 0.6
hygiene = 0.3

[needs.initial]
hunger  = 80.0
energy  = 80.0
fun     = 80.0
social  = 80.0
hygiene = 80.0

[needs.thresholds]
penalty_mild   = 20.0   # Below this: -2 to relevant checks
penalty_severe = 10.0   # Below this: -4 to relevant checks
forced_action  = 5.0    # Below this: forced (e.g., forced sleep)

[actions.eat]
hunger_restore = 30.0
dc = 0

[actions.cook]
hunger_restore = 45.0
fun_restore    = 10.0
dc             = 12
attribute      = "wit"

[actions.sleep]
duration_ticks          = 16
energy_restore_per_tick = 6.25   # 16 * 6.25 = 100 (full refill)
dc                      = 0

[actions.rest]
energy_restore = 15.0
dc             = 0

[actions.forage]
hunger_restore = 20.0
dc             = 10
attribute      = "grace"

[actions.fish]
hunger_restore = 35.0
fun_restore    = 10.0
dc             = 12
attribute      = "grace"

[actions.exercise]
fun_restore   = 15.0
energy_drain  = 10.0
dc            = 10
attribute     = "vigor"

[actions.chat]
social_restore = 20.0
fun_restore    = 8.0
dc             = 8
attribute      = "heart"

[actions.bathe]
hygiene_restore = 50.0
dc              = 0

[actions.explore]
fun_restore = 20.0
dc          = 12
attribute   = "vigor"

[actions.play]
fun_restore = 15.0
dc          = 0

[actions.cast_intent]
min_duration_ticks = 1
max_duration_ticks = 4
energy_drain       = 8.0
dc                 = 0        # Spells always succeed
attribute          = "numen"  # Governs clarity, not success

[actions.pray]
fun_restore    = 5.0
social_restore = 3.0
dc             = 0

[actions.read_oracle]
fun_restore    = 10.0
social_restore = 5.0
dc             = 0

[resolution]
crit_fail     = 1
crit_success  = 20
dc_easy       = 8
dc_medium     = 12
dc_hard       = 16
night_dc_bonus = 4   # Added to Forage/Explore DCs at night

[memory]
buffer_size    = 20
journal_n_runs = 3   # how many past run-day sections to load per agent

[simulation]
# default_run_ticks    = 144   # 3 days
default_run_ticks    = 96    # 2 days (for faster iteration)
state_dump_interval  = 48    # Dump every in-game day

[llm]
model                  = "gemma3:4b"
# model                 = "qwen3.5:9b"  
temperature            = 0.7
max_tokens             = 2000   # thinking models need room for <think> block before answer
ollama_url             = "http://localhost:11434"
llamacpp_url           = "http://localhost:8080"  # llama.cpp server (OpenAI-compatible /v1/chat/completions)
interpreter_max_tokens = 2000
planning_max_tokens    = 1000
reflection_max_tokens  = 1500
# smart_model      = "llama3:70b"     # optional: separate model for planning/reflection/desires
# smart_ollama_url = "http://localhost:11435"  # separate Ollama for the smart model
think = false                        # set to false to disable chain-of-thought on thinking models (qwen3, deepseek-r1, etc.)
thinking_budget_chars  = 8000        # abort stream if thinking tokens exceed this many chars
narrator_max_tokens    = 1000
desires_max_tokens     = 2000
oracle_max_tokens             = 1500
journal_summary_max_tokens    = 200

[world]
resource_respawn_ticks = 20

[events]
storm_prob    = 0.005   # ~once per 200 ticks
festival_prob = 0.003   # ~once per 333 ticks
windfall_prob = 0.010   # ~once per 100 ticks
residue_prob  = 0.008   # ~once per 125 ticks

[actions.praise]
fun_restore    = 10.0
energy_restore = 5.0
social_restore = 5.0
dc             = 0

[actions.compose]
fun_restore    = 10.0
social_restore = 5.0
dc             = 0
